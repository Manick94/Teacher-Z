# Render.com deployment configuration for Teacher-Z
# Push to GitHub and connect this repo in the Render dashboard.

services:
  - type: web
    name: teacher-z-api
    runtime: python
    plan: free  # upgrade to "starter" for always-on
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: DATABASE_URL
        value: sqlite:///./teacherz.db
      - key: LLM_PROVIDER
        value: stub          # change to "ollama" or "local_transformers" when ready
      - key: IMAGE_PROVIDER
        value: stub
      - key: CORS_ORIGINS
        value: https://teacher-z.onrender.com,http://localhost:5173
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
